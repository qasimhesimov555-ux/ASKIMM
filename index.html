    <!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Özel Mesaj 💙</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: pink;
    overflow: hidden;
    font-family: Arial;
}

/* Kalpler */
.heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* Mektup */
.envelope {
    width: 220px;
    height: 150px;
    background: #4da6ff;
    position: relative;
    cursor: pointer;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.envelope:hover {
    transform: scale(1.1);
}

/* Kağıt */
.letter {
    position: absolute;
    width: 300px;
    height: 250px;
    background: rgb(12, 4, 226);
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    border-radius: 10px;
    padding: 15px;
    box-sizing: border-box;
    text-align: center;
    opacity: 0;
    transition: 0.5s;
    color: black;
}

/* Açılınca */
.show {
    top: -190px;
    opacity: 1;
}

/* GIF */
.gif {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 150px;
}

/* SOL */
.gif-left {
    left: -200px;
}

/* SAĞ */
.gif-right {
    right: -200px;
}
</style>

</head>
<body>

<div class="envelope" onclick="openLetter()">

    <!-- SOL GIF -->
    <img class="gif gif-left" src="https://i.pinimg.com/originals/6b/1d/69/6b1d69b588ce67dda3e65c96a86cfedc.gif">

    Aç 💙

    <!-- SAĞ GIF -->
    <img class="gif gif-right" src="https://i.pinimg.com/originals/ee/f1/8e/eef18ec08f5d93096607e804a508703c.gif">

    <div class="letter" id="letter">
        SENİ ÇOK SEVİYORUM SEVİYORUM💙
        BU ŞİİR SANA
    <p>HER GÜN AKLIMDASIN❤️</p>
    <p>HER GÜN KALBİMDE🌙</p>
    <p>ÇIKMIYOSUN AKLIMDAN❤️</p>
    <p>AKLIM ÇIKIYO YERİNDEN</p>
    <p>SEN ÇIKMIYOSUN😘</p>
    </div>

</div>

<script>
function openLetter() {
    document.getElementById("letter").classList.toggle("show");
}

/* Kalp üret */
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
